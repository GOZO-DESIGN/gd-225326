  <script>
document.addEventListener("DOMContentLoaded", function () {
  const lightbox = document.querySelector(".video-lightbox");
  const videoEl = document.querySelector(".video-lightbox__video");
  const closeBtn = document.querySelector(".video-lightbox__close");
  const backdrop = document.querySelector(".video-lightbox__backdrop");
  if (!lightbox || !videoEl) return;
  function openLightbox(src) {
    videoEl.src = src;
    lightbox.classList.add("video-lightbox--active");
    videoEl.play().catch(() => {});
  }
  function closeLightbox() {
    lightbox.classList.remove("video-lightbox--active");
    videoEl.pause();
    // optional: src leeren, um Traffic zu sparen
    videoEl.removeAttribute("src");
    videoEl.load();
  }
  // alle Trigger auf der Seite
  const triggers = document.querySelectorAll("[data-video-src]");
  triggers.forEach(function (trigger) {
    trigger.addEventListener("click", function (e) {
      e.preventDefault();
      const src = trigger.getAttribute("data-video-src");
      if (!src) return;
      openLightbox(src);
    });
  });
  // Schließen bei Klick auf X oder Hintergrund
  closeBtn && closeBtn.addEventListener("click", closeLightbox);
  backdrop && backdrop.addEventListener("click", closeLightbox);
  // ESC-Taste schließt die Lightbox
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      closeLightbox();
    }
  });
});
</script>
